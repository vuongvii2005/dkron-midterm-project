services:
  dkron:
    build: .
    image: dkron-local:dev
    entrypoint: ["dkron"]
    command: agent --server --log-level=debug --bootstrap-expect=1
    ports:
      - "8080:8080"
      - "8946"
      - "6868"
    environment:
      - GODEBUG=netdns=go

  dkron-server:
    build: .
    image: dkron-local:dev
    entrypoint: ["dkron"]
    command: agent --server --retry-join=dkron:8946 --log-level=debug --bootstrap-expect=3
    ports:
      - "8080"
      - "8946"
      - "6868"
    environment:
      - GODEBUG=netdns=go

  dkron-agent:
    build: .
    image: dkron-local:dev
    entrypoint: ["dkron"]
    command: agent --retry-join=dkron:8946 --log-level=debug --tag agent=true
    ports:
      - "8946"
      - "6868"
    environment:
      - GODEBUG=netdns=go